# Tiny end-to-end vref run (spec-vref.md verification #4). Small model, 3
# translations, one small held-out book (Jonah), a probe every few steps, so a
# full train + probe + best-checkpoint + generate + score cycle finishes in
# minutes and exercises every vref artefact path. Never a real run.
name: vref_smoke
phase: one-to-many

data:
  selection: experiments/selection-smoke.csv
  holdouts: configs/holdouts-smoke.yaml
  source: vref
  vref_encoding: struct
  max_len: 128
  max_ratio: 0

tokenizer:
  type: bpe
  vocab_size: 4000

model:                    # deliberately tiny; NOT transformer-big
  arch: marian
  encoder_layers: 2
  decoder_layers: 2
  d_model: 256
  encoder_attention_heads: 4
  decoder_attention_heads: 4
  encoder_ffn_dim: 512
  decoder_ffn_dim: 512
  dropout: 0.1
  label_smoothing: 0.1

training:
  optimizer: adamw
  lr: 5.0e-4
  warmup_steps: 200
  lr_scheduler: inverse_sqrt
  max_tokens_per_batch: 8000
  per_device_batch_size: 64
  gradient_accumulation: 1
  max_grad_norm: 1.0
  bf16: true
  max_steps: 1500
  eval_every_steps: 250
  seed: 13

inference:
  beam: 5
  length_penalty: 1.0
  max_length: 128

probe:
  every_steps: 250
  verses_per_language: 40
  min_gain: 0.5
  patience_steps: 750
  batch_size: 64
  seed: 13

oversample_holdouts: 1
