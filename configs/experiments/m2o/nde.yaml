name: m2o_nde
pretrained: facebook/nllb-200-distilled-600M
target: {code: nde, tid: nde, new_token: nde_Latn, script: Latn}
relative: sna_Latn
script_anchor: eng_Latn
sources:
  - {code: sna, tid: sna, flores: sna_Latn}
  - {code: tsn, tid: tsn, flores: tsn_Latn}
  - {code: swh, tid: swhonmm, flores: swh_Latn}
  - {code: lin, tid: lin, flores: lin_Latn}
training: {lr: 3.0e-5, steps: 1500, warmup: 100, batch: 16, grad_accum: 1, gradient_checkpointing: true, max_len: 128}
generate: {books: [RUT, JON], chapters: ["GEN 1:"], beam: 5, max_length: 128}
