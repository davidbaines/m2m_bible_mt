# Many-to-many smoke test on the 3090: exercises the pair sampler and the
# m2m source/target tagging end to end (train + generate) on the tiny 3-language
# smoke selection. Not a real run.
name: smoke_m2m
phase: many-to-many

data:
  selection: experiments/selection-smoke.csv
  holdouts: configs/holdouts-smoke.yaml
  source: greek
  max_len: 128
  max_ratio: 2.0
  pairing: many-to-many
  k: 4

tokenizer:
  type: bpe
  vocab_size: 4000

model:
  arch: marian
  encoder_layers: 2
  decoder_layers: 2
  d_model: 256
  encoder_attention_heads: 4
  decoder_attention_heads: 4
  encoder_ffn_dim: 512
  decoder_ffn_dim: 512
  dropout: 0.1
  label_smoothing: 0.1

training:
  optimizer: adamw
  lr: 5.0e-4
  warmup_steps: 200
  lr_scheduler: inverse_sqrt
  max_tokens_per_batch: 8000
  per_device_batch_size: 64
  gradient_accumulation: 1
  max_grad_norm: 1.0
  bf16: true
  max_steps: 1500
  early_stopping_patience: 5
  eval_every_steps: 250
  seed: 13

inference:
  beam: 5
  length_penalty: 1.0
  max_length: 128

oversample_holdouts: 1
