# NLLB-200-600M fine-tune on the closed text, Indo-European, many-to-many
# (spec.md phase 7, pretrained comparison). A modest local run on the 3090:
# the model is pretrained, so a short fine-tune already adapts it to the Bible
# domain. Held-out OTs (English/German/Hindi) are generated by translating from
# the Spanish pivot (NLLB has no Koine Greek), so the task is easier than the
# from-scratch Greek-source generation; reported separately.
name: nllb_ie
phase: pretrained

data:
  selection: experiments/selection-ie.csv
  holdouts: configs/holdouts-ie.yaml
  source: greek
  max_len: 128
  max_ratio: 2.0
  pairing: many-to-many
  k: 4
  pivot: spa

model:
  arch: nllb
  pretrained: facebook/nllb-200-distilled-600M
  label_smoothing: 0.1

training:
  optimizer: adamw
  lr: 3.0e-5
  warmup_steps: 500
  lr_scheduler: inverse_sqrt
  per_device_batch_size: 16
  gradient_accumulation: 2
  max_grad_norm: 1.0
  bf16: true
  max_steps: 6000
  early_stopping_patience: 4
  eval_every_steps: 750
  seed: 13
  gradient_checkpointing: true

inference:
  beam: 5
  length_penalty: 1.0
  max_length: 128
